<main class="page">
  <header class="page__header">
    <h1 class="page__title">{{ title }}</h1>
    <p class="page__subtitle">
      A basic example of the <code>photon-grid</code> component from the
      <code>photon-grid-angular</code> package.
    </p>
  </header>

  <!-- Referenced by the `country` column's template-based renderer (see
       app.component.ts). Renders nothing on its own — an <ng-template> is
       only ever instantiated through its TemplateRef. -->
  <ng-template #countryTpl let-params>
    <div class="country-cell">
      <span class="country-cell__flag"><img [src]="'http://flagcdn.com/32x24/' + COUNTRY_FLAGS[params.value]?.toLowerCase() + '.png'" /></span>
      <span class="country-cell__name">{{ params.value }}</span>
    </div>
  </ng-template>

  <section class="grid-wrapper">
    <photon-grid
      [columns]="columns"
      [dataSet]="data"
      [options]="options"
      (gridReady)="onGridReady($event)"
      (rowClicked)="onRowClicked($event)" 
      (rowSelected)="onRowSelected($event)"> 
    </photon-grid>
  </section>
</main>
